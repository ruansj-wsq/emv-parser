
<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EMV TLV 智能解析器 | Pro Decoder</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        brand: {
                            50: '#f0f9ff',
                            100: '#e0f2fe',
                            500: '#0ea5e9',
                            600: '#0284c7',
                            700: '#0369a1',
                            900: '#0c4a6e',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        body {
            background-color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .tlv-tree-line {
            position: absolute;
            left: 14px;
            top: 24px;
            bottom: 0;
            width: 1px;
            background-color: #e2e8f0;
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9; 
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1; 
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8; 
        }
        .fade-in {
            animation: fadeIn 0.3s ease-in-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col">

    <!-- Navbar -->
    <nav class="bg-white border-b border-slate-200 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center gap-3">
                    <div class="bg-brand-600 text-white p-2 rounded-lg shadow-lg shadow-brand-500/30">
                        <i class="fa-solid fa-microchip text-xl"></i>
                    </div>
                    <span class="font-bold text-xl tracking-tight text-slate-900">EMV<span class="text-brand-600">Decoder</span></span>
                </div>
                <div class="flex items-center gap-4">
                    <button onclick="app.clearAll()" class="text-sm text-slate-500 hover:text-red-500 transition-colors font-medium">
                        <i class="fa-solid fa-trash-can mr-1"></i> 清空
                    </button>
                    <a href="https://github.com" target="_blank" class="text-slate-400 hover:text-slate-600 transition-colors">
                        <i class="fa-brands fa-github text-xl"></i>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full">
        
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-8">
            
            <!-- Left Column: Input & Controls -->
            <div class="lg:col-span-5 space-y-6">
                
                <!-- Input Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <h2 class="font-semibold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-keyboard text-brand-500"></i> 数据输入
                        </h2>
                        <span class="text-xs font-mono bg-slate-200 text-slate-600 px-2 py-1 rounded">HEX String</span>
                    </div>
                    <div class="p-5">
                        <div class="relative">
                            <textarea id="hexInput" 
                                class="w-full h-48 p-4 font-mono text-sm bg-slate-50 border border-slate-300 rounded-xl focus:ring-2 focus:ring-brand-500 focus:border-brand-500 outline-none transition-all resize-none text-slate-700 placeholder-slate-400"
                                placeholder="在此粘贴 HEX 数据 (例如: 9F0206000000001000...)"
                                spellcheck="false"></textarea>
                            <div class="absolute bottom-3 right-3 flex gap-2">
                                <button onclick="app.formatInput()" class="p-2 text-slate-400 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition-all" title="格式化输入">
                                    <i class="fa-solid fa-align-left"></i>
                                </button>
                                <button onclick="app.pasteFromClipboard()" class="p-2 text-slate-400 hover:text-brand-600 hover:bg-brand-50 rounded-lg transition-all" title="从剪贴板粘贴">
                                    <i class="fa-regular fa-clipboard"></i>
                                </button>
                            </div>
                        </div>
                        
                        <div class="mt-4 flex gap-3">
                            <button onclick="app.parse()" class="flex-1 bg-brand-600 hover:bg-brand-700 text-white font-medium py-2.5 px-4 rounded-xl shadow-lg shadow-brand-500/30 transition-all active:scale-95 flex justify-center items-center gap-2">
                                <i class="fa-solid fa-bolt"></i> 立即解析
                            </button>
                            <button onclick="app.loadSample()" class="px-4 py-2.5 bg-white border border-slate-300 text-slate-700 font-medium rounded-xl hover:bg-slate-50 transition-all">
                                示例
                            </button>
                        </div>
                    </div>
                </div>

                <!-- History Card -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden">
                    <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <h2 class="font-semibold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-clock-rotate-left text-brand-500"></i> 解析历史
                        </h2>
                        <button onclick="app.clearHistory()" class="text-xs text-slate-400 hover:text-red-500">清除历史</button>
                    </div>
                    <div class="p-0">
                        <ul id="historyList" class="divide-y divide-slate-100 max-h-64 overflow-y-auto">
                            <!-- History items will be injected here -->
                            <li class="p-4 text-center text-slate-400 text-sm italic">暂无历史记录</li>
                        </ul>
                    </div>
                </div>

            </div>

            <!-- Right Column: Output & Visualization -->
            <div class="lg:col-span-7 space-y-6">
                
                <!-- Stats Bar -->
                <div class="grid grid-cols-3 gap-4">
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                        <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Tags Found</span>
                        <span id="statTags" class="text-2xl font-bold text-brand-600 mt-1">0</span>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                        <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Data Length</span>
                        <span id="statLength" class="text-2xl font-bold text-indigo-600 mt-1">0 B</span>
                    </div>
                    <div class="bg-white p-4 rounded-xl border border-slate-200 shadow-sm flex flex-col items-center justify-center">
                        <span class="text-xs text-slate-500 uppercase font-bold tracking-wider">Status</span>
                        <span id="statStatus" class="text-sm font-bold text-emerald-600 mt-1 bg-emerald-50 px-2 py-1 rounded-full">Ready</span>
                    </div>
                </div>

                <!-- Result Tree -->
                <div class="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden min-h-[500px] flex flex-col">
                    <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex justify-between items-center">
                        <h2 class="font-semibold text-slate-800 flex items-center gap-2">
                            <i class="fa-solid fa-tree text-brand-500"></i> 结构化视图
                        </h2>
                        <div class="flex gap-2">
                            <button onclick="app.exportJSON()" class="text-xs bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                                <i class="fa-solid fa-file-code"></i> JSON
                            </button>
                            <button onclick="app.copyResult()" class="text-xs bg-white border border-slate-300 hover:bg-slate-50 text-slate-700 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-1">
                                <i class="fa-regular fa-copy"></i> 复制
                            </button>
                        </div>
                    </div>
                    
                    <div class="p-6 overflow-x-auto flex-grow bg-slate-50/30 relative">
                        <div id="resultContainer" class="font-mono text-sm">
                            <div class="flex flex-col items-center justify-center h-64 text-slate-400">
                                <i class="fa-solid fa-layer-group text-4xl mb-3 opacity-20"></i>
                                <p>等待数据输入...</p>
                            </div>
                        </div>
                    </div>
                </div>

            </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="bg-white border-t border-slate-200 mt-auto">
        <div class="max-w-7xl mx-auto px-4 py-6 sm:px-6 lg:px-8 flex justify-between items-center">
            <p class="text-slate-500 text-sm">© 2026 EMV Decoder Tool. Local Processing Only.</p>
            <div class="flex gap-4 text-sm text-slate-500">
                <span class="flex items-center gap-1"><i class="fa-solid fa-shield-halved text-emerald-500"></i> Privacy Safe</span>
                <span class="flex items-center gap-1"><i class="fa-solid fa-bolt text-yellow-500"></i> Fast Parse</span>
            </div>
        </div>
    </footer>

    <!-- Application Logic -->
    <script src="app.js"></script>
</body>
</html>
